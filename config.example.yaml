# ad-decompiler config — copy to config.yaml and adjust for your Windows/RTX 5080 box.
device: cuda                          # cuda | cpu

archetype:
  # auto | social_screenshot | caption_over_photo | comparison_grid |
  # lifestyle_overlay | product_on_flat
  preset: auto
  # Optional semantic facts supplied by a scene/VLM pass. The classifier never uses
  # filenames. Examples: photo_coverage, flat_background_fraction, social_header,
  # text_backplate_count, column_count, center_divider, leader_lines, product_count.
  observations: {}

# Gemma 4 e4b is part of the RTX quality path: proofread OCR, classify layout context,
# arbitrate uncertain segments, and propose visual elements before geometric refinement.
# misreads (stylized ad type, small/dense labels) that OCR confidence alone can't flag as
# *wrong*, only uncertain. Requires LM Studio's OpenAI-compatible server with the exact model
# below loaded. doctor.py verifies that identity before an acceptance run starts.
vlm:
  enabled: true
  base_url: http://127.0.0.1:1234/v1
  model: google/gemma-4-e4b
  timeout_s: 30                        # bounded per request; stages fall back safely on a timeout
  max_tokens: 1024                     # enough room for Gemma reasoning + final structured output
  confidence_threshold: 0.85           # only lines below this OCR confidence get checked
  passes: 2                           # both passes must agree before OCR text is replaced
  segment_filter:                    # optional VLM crop review for fused SAM elements
    enabled: true
    padding: 8
    passes: 2
    max_elements: 24                  # cap VLM calls per run
    reject_mode: remove               # remove | mark (mark keeps element with meta.vlm_rejected)
    refine_role:                     # second VLM pass after keep → meta.role
      enabled: false
      passes: 2
  ocr_judge:                         # optional VLM arbitration when OCR engines disagree
    enabled: true
    passes: 2                         # both passes must agree before text is replaced
    padding: 3
    max_lines: null                     # cap disagreement judgements per run
    allow_novel_reading: false          # reject unrelated crop text instead of inventing a third reading
    min_reading_similarity: 0.55        # permits likely OCR corrections but rejects unrelated answers
    ocr_read:                           # optional grid scan for text all engines missed
      enabled: false
      grid_cols: 4
      grid_rows: 4
      max_image_pixels: 4000000         # skip ocr_read when canvas exceeds this
      max_regions: 8
      passes: 2
  font_judge:                        # optional VLM re-rank after local font matching
    enabled: true
    score_threshold: 7                # 0-10; below this tries the next candidate (max 3)
    max_candidates: 3
    passes: 2                         # both passes must agree on winner/score
    padding: 4
    max_styles: 12
    # Also runs automatically when text_analysis.font_matching.local_score_threshold
    # is not met and vlm.enabled is true — even if font_judge.enabled is false.
  scene_text:                      # optional VLM text-placement classifier after text_analysis
    enabled: true
    context_padding: 24            # crop padding so the model sees surrounding layout
    passes: 2
    max_lines: 32
    max_total_s: 90                 # cap the whole advisory pass; remaining lines stay raster-owned
  element_propose:                   # optional VLM coarse boxes before SAM box-refine
    enabled: true
    lightweight_grid: false            # harness rerun-detection can enable a cheap grid pass
    lightweight_grid_below_sam_count: 3  # when set, auto-enables lightweight grid if prior sam count is below
    lightweight_grid_size: 2
    lightweight_max_tiles: 8
    lightweight_overlap: 0.15
    grid: 4                           # NxN overlapping tiles (and gap sampling)
    overlap: 0.25                     # tile overlap fraction
    tile_mode: both                   # grid | gaps | both (gaps = low residual coverage)
    gap_coverage: 0.35                # max residual overlap for a gap tile
    passes: 2                         # both passes must agree on proposal count + boxes
    iou_thresh: 0.55                  # dedupe against residual + other VLM proposals
    max_tiles: 20
    max_proposals: 32

# An RTX acceptance run must show which model actually ran. Disabled models remain valid for
# CPU development, but enabled OCR/SAM fallbacks become QA failures instead of quiet boxes.
runtime:
  require_active_models: true
  auto_repair: true                   # re-run mapped repair stages after QA failure
  harness:
    enabled: true                     # failure-proof repair loop after QA/staging issues
    max_rounds: 2                     # bounded pipeline + repair + critic + fixer cycles
    repair_iterations: 1              # one measured repair per round; never batch blind retries
    plateau_rounds: 1                 # stop after one round with no measurable QA gain
    epsilon: 0.005                     # changes smaller than this count as no progress
    reward: phase2                    # phase2: metric-ladder round score (per-element local
                                      # SSIM + LPIPS perceptual + text recall, per-archetype
                                      # weights) + capped VLM critique as the repair driver;
                                      # legacy: old composite (0.75*ssim + 0.25*text).
                                      # Hard-fail acceptance semantics identical in both.
  auto_retry:
    sam_disable_compile: true         # one safe retry only when compile=true fails
  vram:
    # 16 GB (RTX 5080) cannot hold the VLM (gemma-4-12b ~7.5 GB, resident in LM Studio) +
    # SAM3 (~3 GB) + Flux Fill Q6 GGUF (9.2 GB) + t5xxl fp8 (4.5 GB) at once. gc.collect()
    # + torch.cuda.empty_cache() run at every stage boundary; before the heavy ComfyUI Flux
    # inpaint the VLM is unloaded (`lms unload`) and reloaded after (`lms load`, ~5 s).
    unload_ocr_before_sam: true       # drop OCR model caches before SAM loads
    empty_cache_between_stages: true  # gc + torch.cuda.empty_cache(); default true when device=cuda
    evict_vlm_for_inpaint: true       # unload the LM Studio VLM for the Flux inpaint stage
    reload_vlm_after_inpaint: true     # reload it once inpaint completes (default: = evict flag)
    # vlm_reload_ttl_s: 0             # optional TTL passed to `lms load --ttl`
    # lms_path: ""                    # optional explicit path to the LM Studio `lms` CLI

ocr:
  # doctr is the working in-process GPU OCR on RTX 50-series (Blackwell / sm_120):
  # paddlepaddle-gpu 3.0 ships no sm_120 kernels and its cu126 CUDA libs also collide
  # with torch's cu128 DLLs in a shared venv, so ppocr-v6 can't use the GPU here (it
  # only auto-retries on CPU, which is slow). Kept ppocr-v6 + tesseract as fallbacks.
  primary: doctr                      # ppocr-v6 | surya | doctr | easyocr | tesseract
  challengers: []                     # optional in-process surya or easyocr (pip install surya-ocr / easyocr)
  fallback_engines: [ppocr-v6, tesseract]  # tried when primary + challengers fail; easyocr also supported
  auto_fallback_tesseract: true        # also auto-try tesseract when binary is on PATH
  ensemble_disagreement:               # when vlm.enabled, proofread confident-but-disputed lines
    enabled: true
    min_confidence: 0.85
  lang: en
  retry_2x:                           # targeted retry for small/low-confidence text
    enabled: true
    scale: 2.0
    max_regions: 8

text_analysis:
  cap_height_ratio: 0.72
  font_matching:
    enabled: true                     # synthetic-render retrieval against locally installed fonts
    max_fonts: 64
    max_lines: 16
    top_k: 5
    local_score_threshold: 0.55       # auto VLM font judge when top render score is below this
    google_fonts_cache: ~/.cache/google-fonts
    fallback_families: [Inter, Arial, Helvetica, Roboto]
    font_dirs: []                     # add brand/font-library folders here

sam3:
  enabled: true
  checkpoint: C:/models/sam3.pt        # image checkpoint, not the 3.1 video multiplex checkpoint
  # bpe_path: C:/src/sam3/sam3/assets/bpe_simple_vocab_16e6.txt.gz
  load_from_hf: false                 # local-only by default; no surprise downloads
  confidence: 0.45
  box_refine_confidence: 0.32         # lower bar for geometric refine when residuals exist
  resolution: 1008
  compile: false
  # Every residual proposal is also box-refined; prompts find missed semantic elements.
  prompts:
    - {prompt: person, role: person, kind: photo-fragment}
    - {prompt: product, role: product, kind: photo-fragment}
    - {prompt: product package, role: product, kind: photo-fragment}
    - {prompt: product shot, role: product, kind: photo-fragment}
    - {prompt: logo, role: logo, kind: icon}
    - {prompt: brand logo, role: logo, kind: icon}
    - {prompt: icon, role: icon, kind: icon}
    - {prompt: app icon, role: icon, kind: icon}
    - {prompt: arrow, role: arrow, kind: icon}
    - {prompt: callout leader line, role: callout_leader, kind: icon}
    - {prompt: badge, role: badge, kind: icon}
    - {prompt: price badge, role: badge, kind: icon}
    - {prompt: sale badge, role: badge, kind: icon}
    - {prompt: button, role: button, kind: shape}
    - {prompt: cta button, role: button, kind: shape}
    - {prompt: call to action, role: button, kind: shape}
    - {prompt: card, role: card, kind: shape}
    - {prompt: offer card, role: card, kind: shape}
    - {prompt: illustration, role: illustration, kind: photo-fragment}
    # Structured artwork preserved as one named, swappable source crop.
    - {prompt: screenshot, role: screenshot, kind: photo-fragment}
    - {prompt: UI panel, role: ui-panel, kind: photo-fragment}
    - {prompt: receipt, role: receipt, kind: photo-fragment}
    - {prompt: chart or graph, role: chart, kind: photo-fragment}
    - {prompt: table or nutrition facts panel, role: nutrition-panel, kind: photo-fragment}
    - {prompt: diagram or infographic, role: diagram, kind: photo-fragment}
    - {prompt: inseparable product cluster, role: product-cluster, kind: photo-fragment}

element_fusion:
  mask_iou: 0.68
  bbox_iou: 0.78
  containment: 0.92
  nested_max_area_ratio: 0.62

qwen:
  enabled: false                       # opt in only after the separate local ComfyUI service is online
  required: false                      # set true only for an experiment that depends on its alpha layers
  mode: comfyui                       # comfyui | direct-diffusers
  # For a rented/remote GPU use https://cloud.comfy.org and set COMFY_CLOUD_API_KEY.
  # Keep secrets in the environment; api_key_env names the variable to read.
  base_url: http://127.0.0.1:8188
  api_key_env: COMFY_CLOUD_API_KEY
  failure_cooldown_s: 900              # do not repeat a deterministic 400 in harness rounds
  workflow: workflows/qwen_layered_8_api.json
  layers: 8
backend_url: http://127.0.0.1:8188    # ComfyUI, only used when qwen.mode=comfyui

vectorize:
  color_engine: vtracer               # resolved from PATH or .bin/vtracer(.exe)
  binary_engine: potrace
  contour_fallback: true               # OpenCV approxPolyDP for flat single-color icons
  contour_epsilon: 0.02
  preprocess:
    enabled: true
    upscale_below: 48                  # upscale crops whose min side is below this
    upscale_target: 96
    quantize_colors: true
    max_colors: 16
    denoise_fringe: true               # harden alpha to remove anti-alias fringe
  score_min:                           # role-based fidelity gate (lower = fewer false rejects)
    default: 0.85
    icon: 0.82
    logo: 0.82
    badge: 0.80
    arrow: 0.82
    chip: 0.80
    mask: 0.78
    shape: 0.88
  max_paths:                           # role-based complexity cap
    default: 40
    icon: 60
    logo: 50
    badge: 35
    arrow: 30
    chip: 35
    mask: 20
    shape: 45
  vtracer_presets:                     # tried in order before potrace / contour fallback
    - {mode: spline, colormode: color, hierarchical: stacked, filter_speckle: 4}
    - {mode: spline, colormode: color, hierarchical: cutout, filter_speckle: 2}
    - {mode: polygon, colormode: color, hierarchical: stacked, filter_speckle: 8}
    - {mode: spline, colormode: binary, hierarchical: stacked, filter_speckle: 2}
  potrace_thresholds: [8, 16, 32, 64]  # alpha/luminance cutoffs tried in order

reconstruct:
  dedup_iou: 0.86
  mask_dilate: 2
  # Sparse OCR glyphs stay ink-shaped. Full text rectangles are never removed unless
  # explicitly opted in; a flat opaque label can still be proven from source contrast.
  allow_text_box_fallback: false
  allow_opaque_text_region_fallback: true
  text_box_promote_max_fraction: 0.0
  # Conservative primitive paint extraction for semantic shapes only.  It preserves
  # source-provided paint facts and falls back to a plain fill for uncertain masks.
  style_extraction:
    gradient_min_range: 18
    gradient_min_r2: 0.86
    max_stroke_width: 8
    detect_shadows: true

inpaint:
  mode: auto                           # Big-LaMa when installed; OpenCV is a deterministic fallback
  allow_fallback: true
  # Acceptance runs can block automatic degradation to OpenCV. An explicitly configured
  # `mode: opencv` remains available for local debugging/tests, but it is recorded as such.
  strict_acceptance: false
  opencv_radius: 5
  opencv_method: auto                  # auto ranks Telea/NS by seam, texture, structure and residue
  quality:                              # deterministic CPU-only candidate ranking weights
    seam_weight: 1.0
    texture_weight: 0.35
    structure_weight: 0.20
    residue_weight: 0.80
  mask_feather: 1                      # minimal edge soften on the union mask (0 = off)
  multipass_fraction: 0.12             # coarse→fine when removal area exceeds this fraction
  regional:
    enabled: true                       # crop-local routing; preserves one canonical union/plate
    # Route by local background complexity. Flat/low-entropy holes -> analytic plate model
    # or Big-LaMa; only complex/photographic local backgrounds -> Flux Fill. Diffusion Fill
    # hallucinates objects into large plain-background holes (RePainter, OmniPaint 2025-26)
    # while LaMa interpolates flat/gradient plates cleanly at ~50x the speed. Text holes
    # always stay on Big-LaMa. Set true to force every non-text hole to Flux.
    force_flux: false
    min_context: 64
    max_context: 96
    # local keeps a bounded crop; expanded multiplies context_scale; global gives the
    # backend the full original source canvas. Every regional call still sees source-only
    # context, never pixels generated for an earlier region.
    context_mode: local                 # local | expanded | global
    context_scale: 1.0
    expanded_context_scale: 2.0
    min_crop: 256
    alignment: 16
    ring_radius: 24
    dominant_plate_fraction: 0.55
    dominant_plate_tolerance: 12
    flat_residual_p90: 10
    flat_gradient_p90: 10
    flux_residual_p90: 18
    flux_gradient_p90: 18
    flux_max_canvas_fraction: 0.025     # never ask Flux to invent a large product/text hole
    photo_prompt: ""                    # photo holes: let Fill dev inpaint from context
    plate_prompt: "clean plain seamless background, empty, no text, no objects"
    nested_containment: 0.88
    duplicate_overlap: 0.65
  # Flux Fill is used only for crop-local regions whose exterior is genuinely complex.
  # Plain/gradient plates route to analytic fill or Big-LaMa to avoid invented objects.
  comfy:
    enabled: false                     # enable on the RTX/ComfyUI workstation
    # Comfy Cloud is API-compatible: set this to https://cloud.comfy.org and export
    # COMFY_CLOUD_API_KEY to run the same crop-local Flux workflow on a virtual GPU.
    base_url: http://127.0.0.1:8188
    api_key_env: COMFY_CLOUD_API_KEY
    workflow: workflows/flux_fill_inpaint_api.json
    # Settings locked by A/B 2026-07-15 (runs/flux-settings-ab, fixtures 009/041/052):
    # guidance 3.5 + steps 8 + empty prompt won on the photo/complex holes that route to
    # Flux; steps 20 = no consistent gain at 2x latency; descriptive prompts hurt photo
    # holes. Large plain-background holes hallucinate under EVERY setting — the fix is
    # routing (regional.force_flux: false), not settings.
    steps: 8                            # native Flux Fill dev (no turbo LoRA)
    cfg: 1.0
    guidance: 3.5
    denoise: 1.0
    seed: 0
    attempts: 2                         # pick lowest seam score across seeds
    prompt: ""
    negative_prompt: ""
    required: false
    # Pick the Flux Fill GGUF by whole-GPU free VRAM measured at inpaint time (after the VLM
    # is evicted). Set false to always use models.unet_gguf below.
    vram_adaptive_quant: true
    quant_vram_thresholds:
      high_min_free_mib: 10240          # >=10 GB free -> high; >=7.5 GB -> mid; else low
      mid_min_free_mib: 7680
    quant_ladder:
      high: flux1-fill-dev-Q6_K.gguf
      mid: flux1-fill-dev-Q5_K_S.gguf
      low: flux1-fill-dev-Q4_K_S.gguf
    # models:                           # explicit filenames (unet_gguf is the non-adaptive fallback)
    #   unet_gguf: flux1-fill-dev-Q6_K.gguf
    #   t5xxl: t5xxl_fp8_e4m3fn.safetensors
    #   clip_l: clip_l.safetensors
    #   vae: ae.safetensors
  # Optional user-provided PowerPaint bridge. No PowerPaint/CUDA package is bundled or
  # validated on this machine. The adapter contract is inpaint(rgb, mask, cfg) -> RGB.
  powerpaint:
    enabled: false
    adapter_module: ""                  # e.g. local_powerpaint_adapter on a GPU worker
    callable: inpaint
    required: false
  # Per-target removal-mask dilation (pixels). Buttons need more bleed so anti-aliased
  # shells and re-edits do not leave halos; photos stay tight to protect surroundings.
  mask_dilate:
    default: 2
    button: 4
    shape: 3
    text: 2
    photo: 0
    image: 2
    icon: 2

layout:
  min_container_frac: 0.002
  max_container_frac: 0.82

preview: true                         # composite design.json -> preview.png + layers/ (no Figma needed)

figma:
  enabled: false                      # Figma export is OPTIONAL and can come later; preview is the default output
  require_export: false               # acceptance runs: reject a local-preview-only result; require a fresh plugin export + report
  mode: plugin                        # the production path; creates native nodes through the plugin
  inbox: ~/figma-inbox                # plugin mode staging folder
  bridge_port: 8790

qa:
  visual_pass_ssim: 0.9               # shared gate for pixel_diff, repair, and qa.ok
  # Phase-2 harness reward ladder (active when runtime.harness.reward: phase2).
  # Component weights come from the archetype preset (archetype.apply_preset writes
  # qa.reward_weights at runtime); qa.reward.weights here would override them, e.g.
  #   weights: { local_ssim: 0.40, lpips: 0.30, text: 0.30 }
  # The *_min floors below are conservative anti-degenerate acceptance-gate defaults —
  # they only block runs whose perceptual/per-element evidence contradicts the global
  # score. Archetype thresholds (lpips_similarity_min / reward_local_ssim_min) take
  # precedence, and like every QA threshold they are never lowered mid-loop.
  reward:
    lpips:
      enabled: true                   # LPIPS perceptual term (pip lpips; CPU-capable)
      net: squeeze                    # squeeze (~5 MB, CPU-fast) | alex | vgg
      max_edge: 256                   # downscale bound so CPU scoring stays cheap
    lpips_similarity_min: 0.20        # gate floor on 1 - LPIPS distance
    local_ssim_min: 0.30              # gate floor on the per-element local score
    critique:
      enabled: true                   # VLM diff critique (original vs preview) mapped to
      max_items: 8                    # repair actions — the primary repair driver; falls
      timeout_s: 45                   # back to tool-only repairs when LM Studio is
      max_tokens: 900                 # unavailable or the model was evicted

qa_ocr: true                          # OCR the render for text-recall QA
export_wait_s: 0                      # >0 to poll for the plugin's figma_export.png
peel:
  enabled: false            # OPTIONAL occlusion-attributed decomposition (docs/PEEL-DECOMPOSITION.md), default-OFF.
  min_overlap_area: 64
  min_overlap_frac: 0.02
  hole_dilate_px: 2
  context_pad_px: 24
  min_context_frac: 0.05
  text_occluders: box
  refine_alpha: false
  refine_band_px: 3
