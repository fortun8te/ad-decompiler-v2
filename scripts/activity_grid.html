<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pipeline</title>
<style>
  :root {
    --bg: #070708;
    --card: #0c0c0f;
    --pill: #141418;
    --lavender: #a78bfa;
    --lavender-dim: #7c6bb5;
    --amber: #f59e0b;
    --rose: #f43f5e;
    --muted: #5c5c66;
    --text: #d4d4dc;
    --text-dim: #8a8a96;
    --line: #1a1a20;
    --cell: #1c1c24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
    min-height: 100%;
  }
  body {
    display: grid;
    place-items: center;
    padding: 40px 24px;
  }
  .shell {
    width: min(640px, 100%);
    background: var(--card);
    border-radius: 20px;
    padding: 22px 22px 20px;
  }

  /* —— live header —— */
  .live {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }
  .live-ad {
    font-size: 13px;
    color: var(--text);
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .live-ad span {
    color: var(--muted);
    font-weight: 400;
  }
  .ticker {
    margin: -8px 0 16px;
    font-size: 11px;
    color: #6e6e78;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 16px;
    font-variant-numeric: tabular-nums;
  }
  .ticker em {
    font-style: normal;
    color: var(--lavender);
  }
  .ticker.flash {
    color: var(--text-dim);
  }
  .pulse-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3a3a44;
    flex-shrink: 0;
  }
  .pulse-dot.on {
    background: var(--lavender);
    animation: breathe 1.2s ease-in-out infinite;
  }
  .pulse-dot.stall { background: var(--amber); animation: none; }
  .live-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .chip {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--pill);
    border-radius: 999px;
    padding: 4px 10px;
    line-height: 1.2;
  }
  .chip.stage { color: var(--lavender); }
  .chip.stall { color: var(--amber); }
  .chip.fail { color: var(--rose); }
  .nums {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .nums b { color: var(--text-dim); font-weight: 500; }

  /* —— benchmark capsule —— */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .capsule {
    margin-bottom: 22px;
  }
  .heat {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    background: transparent;
    box-shadow: inset 0 0 0 1px #2a2a34;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    border: 0;
    padding: 0;
    margin: 0;
    outline: none;
    box-sizing: border-box;
  }
  .dot:focus { outline: none; }
  .dot:hover { box-shadow: inset 0 0 0 1px #5a5a68; }
  .dot.l1 { background: #3b3358; box-shadow: none; }
  .dot.l2 { background: #52487a; box-shadow: none; }
  .dot.l3 { background: #6f62a8; box-shadow: none; }
  .dot.l4 { background: #8f7fd4; box-shadow: none; }
  .dot.l5 { background: var(--lavender); box-shadow: none; }
  .dot.active {
    background: var(--lavender);
    box-shadow: none;
    animation: breathe 1.5s ease-in-out infinite;
  }
  .dot.stalled { background: var(--amber); box-shadow: none; animation: none; }
  .dot.failed { background: var(--rose); box-shadow: none; animation: none; }
  .dot.selected {
    box-shadow: inset 0 0 0 1px #e8e8ef;
  }
  .dot.selected.l5,
  .dot.selected.active,
  .dot.selected.l1,
  .dot.selected.l2,
  .dot.selected.l3,
  .dot.selected.l4,
  .dot.selected.stalled,
  .dot.selected.failed {
    box-shadow: 0 0 0 1px #e8e8ef;
  }
  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .bench-foot {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    padding: 0 4px;
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* —— per-ad stage row —— */
  .stage-row {
    display: flex;
    gap: 3px;
    margin-bottom: 8px;
  }
  .scell {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid #2a2a34;
    background: transparent;
    flex: 0 0 14px;
    cursor: default;
  }
  .scell.done {
    border-color: var(--lavender);
    background: var(--lavender);
  }
  .scell.active {
    border-color: var(--lavender);
    background: var(--lavender);
    animation: breathe 1.5s ease-in-out infinite;
  }
  .scell.stalled {
    border-color: var(--amber);
    background: var(--amber);
    animation: none;
  }
  .scell.failed {
    border-color: var(--rose);
    background: var(--rose);
  }
  .stage-names {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #3a3a44;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }

  /* —— detail / compare —— */
  .detail {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .detail-body {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .detail-id {
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .detail-line {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .detail-line em {
    font-style: normal;
    color: var(--lavender);
  }
  .detail-hint {
    font-size: 10px;
    color: #3a3a44;
  }
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .frame {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .frame-label {
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .frame-shot {
    aspect-ratio: 1;
    width: 100%;
    border-radius: 12px;
    background: #111116;
    overflow: hidden;
    position: relative;
  }
  .frame-shot.has-img {
    cursor: zoom-in;
  }
  .frame-shot.has-img:hover {
    outline: 1px solid #2a2a34;
    outline-offset: 2px;
  }
  .frame-shot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .frame-shot .empty {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: #33333c;
    font-size: 10px;
    text-align: center;
    padding: 12px;
    line-height: 1.35;
  }
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0, 0, 0, 0.86);
    align-items: center;
    justify-content: center;
    padding: 28px;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox-inner {
    max-width: min(920px, 96vw);
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: default;
  }
  .lightbox-label {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }
  .lightbox img {
    max-width: 100%;
    max-height: calc(92vh - 28px);
    object-fit: contain;
    border-radius: 12px;
    background: #0a0a0c;
    display: block;
  }
  .nav-done {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .nav-done button {
    appearance: none;
    border: 0;
    background: var(--pill);
    color: var(--text-dim);
    font: inherit;
    font-size: 11px;
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .nav-done button:hover { color: var(--text); }
  .nav-done button:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .nav-done .gap { flex: 1; }
  .nav-done .count {
    font-size: 10px;
    color: #3a3a44;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
  <div class="shell" id="shell">
    <div class="live">
      <div class="live-ad" id="liveAd"><span>waiting</span></div>
      <div class="live-meta">
        <span class="pulse-dot" id="pulseDot" title="live sync"></span>
        <span class="chip" id="liveChip">idle</span>
        <span class="nums" id="liveNums"><b>0.0%</b> · 00:00</span>
      </div>
    </div>
    <div class="ticker" id="ticker">waiting for pipeline.log</div>

    <div class="section-label" id="benchLabel">benchmark</div>
    <div class="capsule">
      <div class="heat" id="heat"></div>
      <div class="bench-foot">
        <span id="benchCount">0 / 0</span>
        <span id="benchPct">0.0%</span>
      </div>
    </div>

    <div class="section-label" id="stageLabel">stages</div>
    <div class="stage-row" id="stageRow"></div>
    <div class="stage-names"><span>normalize</span><span>qa</span></div>

    <div class="detail" id="detail">
      <div class="detail-body">
        <div class="detail-id" id="detailId">select an ad</div>
        <div class="detail-line" id="detailLine">click a finished dot to inspect original vs reconstruct</div>
        <div class="detail-hint">sequential batch · one live ad · done ads keep both frames</div>
      </div>
      <div class="compare">
        <div class="frame">
          <div class="frame-label">original</div>
          <div class="frame-shot" id="shotOriginal"><div class="empty">—</div></div>
        </div>
        <div class="frame">
          <div class="frame-label">reconstructed</div>
          <div class="frame-shot" id="shotPreview"><div class="empty">—</div></div>
        </div>
      </div>
      <div class="nav-done">
        <button type="button" id="btnPrev" disabled>prev done</button>
        <button type="button" id="btnNext" disabled>next done</button>
        <span class="gap"></span>
        <span class="count" id="doneNav">0 done</span>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-inner">
      <div class="lightbox-label" id="lightboxLabel"></div>
      <img id="lightboxImg" alt="" />
    </div>
  </div>

<script>
const DEFAULT_STAGES = [
  "normalize","ocr","text","residual","qwen","sam","elements","peel",
  "merge","structure","reconstruct","layout","design","preview","figma",
  "export","diff","qa"
];

const heat = document.getElementById("heat");
const stageRow = document.getElementById("stageRow");
const liveAd = document.getElementById("liveAd");
const liveChip = document.getElementById("liveChip");
const liveNums = document.getElementById("liveNums");
const pulseDot = document.getElementById("pulseDot");
const ticker = document.getElementById("ticker");
const benchLabel = document.getElementById("benchLabel");
const benchCount = document.getElementById("benchCount");
const benchPct = document.getElementById("benchPct");
const stageLabel = document.getElementById("stageLabel");
const detailId = document.getElementById("detailId");
const detailLine = document.getElementById("detailLine");
const shotOriginal = document.getElementById("shotOriginal");
const shotPreview = document.getElementById("shotPreview");
const btnPrev = document.getElementById("btnPrev");
const btnNext = document.getElementById("btnNext");
const doneNav = document.getElementById("doneNav");

let stages = DEFAULT_STAGES.slice();
let state = null;
let selectedId = null;
let pinned = false;          // user clicked a dot — don't auto-jump
let lastRev = -1;
let lastGeneration = -1;

function shortId(id) {
  if (!id) return "";
  // 066_attached_c683... -> 066_attached
  const parts = String(id).split("_");
  if (parts.length >= 2 && /^\d+/.test(parts[0])) {
    return parts.slice(0, 2).join("_");
  }
  return id.length > 22 ? id.slice(0, 20) + "…" : id;
}

function fmtElapsed(s) {
  s = Math.max(0, Math.floor(s || 0));
  return String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
}

function ensureStageCells() {
  if (stageRow.children.length === stages.length) return;
  stageRow.innerHTML = "";
  stages.forEach(() => {
    const el = document.createElement("div");
    el.className = "scell";
    stageRow.appendChild(el);
  });
}

function runsList() {
  return (state && state.benchmark && state.benchmark.runs) || [];
}

function runById(id) {
  return runsList().find(r => r.id === id) || null;
}

function doneRuns() {
  return runsList().filter(r => r.complete);
}

function selectAd(id, fromUser) {
  if (!id) return;
  selectedId = id;
  if (fromUser) pinned = true;
  render(true);
}

function stepDone(delta) {
  const done = doneRuns();
  if (!done.length) return;
  let idx = done.findIndex(r => r.id === selectedId);
  if (idx < 0) idx = delta > 0 ? -1 : 0;
  idx = (idx + delta + done.length) % done.length;
  selectAd(done[idx].id, true);
}

btnPrev.addEventListener("click", () => stepDone(-1));
btnNext.addEventListener("click", () => stepDone(1));

function setShot(el, run, file, emptyMsg, cacheKeyRef) {
  if (!run || !file) {
    el.classList.remove("has-img");
    el.removeAttribute("data-full");
    el.removeAttribute("data-label");
    if (cacheKeyRef.key !== "empty:" + emptyMsg) {
      el.innerHTML = '<div class="empty">' + emptyMsg + "</div>";
      cacheKeyRef.key = "empty:" + emptyMsg;
    }
    return;
  }
  const key = run.id + ":" + file + ":" + Math.floor(run.mtime || 0);
  if (key === cacheKeyRef.key) return;
  cacheKeyRef.key = key;
  el.innerHTML = "";
  const src = "/asset/" + encodeURIComponent(run.id) + "/" + file + "?t=" + Math.floor(run.mtime || Date.now());
  const img = document.createElement("img");
  img.alt = file;
  img.src = src;
  img.onerror = () => {
    el.classList.remove("has-img");
    el.removeAttribute("data-full");
    el.innerHTML = '<div class="empty">missing</div>';
    cacheKeyRef.key = "missing:" + key;
  };
  el.classList.add("has-img");
  el.dataset.full = src;
  el.dataset.label = (file === "preview.png" ? "reconstructed" : "original") + " · " + shortId(run.id);
  el.appendChild(img);
}

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const lightboxLabel = document.getElementById("lightboxLabel");

function openLightbox(src, label) {
  if (!src) return;
  lightboxImg.src = src;
  lightboxLabel.textContent = label || "";
  lightbox.classList.add("open");
  lightbox.setAttribute("aria-hidden", "false");
}

function closeLightbox() {
  lightbox.classList.remove("open");
  lightbox.setAttribute("aria-hidden", "true");
  lightboxImg.removeAttribute("src");
}

shotOriginal.addEventListener("click", () => {
  if (shotOriginal.classList.contains("has-img")) {
    openLightbox(shotOriginal.dataset.full, shotOriginal.dataset.label);
  }
});
shotPreview.addEventListener("click", () => {
  if (shotPreview.classList.contains("has-img")) {
    openLightbox(shotPreview.dataset.full, shotPreview.dataset.label);
  }
});
lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox || e.target === lightboxImg) closeLightbox();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeLightbox();
});

const origCache = { key: "" };
const prevCache = { key: "" };

function paintStages(run) {
  ensureStageCells();
  const done = new Set((run && run.done) || []);
  const active = run && run.active;
  const stalled = run && run.stalled;
  [...stageRow.children].forEach((el, i) => {
    const name = stages[i];
    el.className = "scell";
    if (!run) return;
    if (run.complete || done.has(name)) el.classList.add("done");
    else if (name === active) el.classList.add(stalled ? "stalled" : "active");
    else if (run.failed && name === active) el.classList.add("failed");
  });
}

function paintHeat() {
  const runs = runsList();
  if (heat.children.length !== runs.length) {
    heat.innerHTML = "";
    runs.forEach((run) => {
      const el = document.createElement("div");
      el.className = "dot";
      el.role = "button";
      el.tabIndex = 0;
      el.dataset.id = run.id;
      el.title = run.id;
      el.addEventListener("click", () => selectAd(el.dataset.id, true));
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          selectAd(el.dataset.id, true);
        }
      });
      heat.appendChild(el);
    });
  }
  [...heat.children].forEach((el, i) => {
    const run = runs[i];
    if (!run) return;
    el.dataset.id = run.id;
    el.title = run.id + " · " + run.status + " · " + run.percent.toFixed(1) + "%";
    el.className = "dot";
    if (run.status === "running") el.classList.add("active");
    else if (run.status === "stalled") el.classList.add("stalled");
    else if (run.status === "failed") el.classList.add("failed");
    else if (run.level > 0) el.classList.add("l" + run.level);
    if (run.id === selectedId) el.classList.add("selected");
  });
}

function renderDetail() {
  const id = selectedId || (state && state.live && state.live.image_id);
  const run = id ? runById(id) : null;
  const done = doneRuns();
  const doneIdx = run ? done.findIndex(r => r.id === run.id) : -1;

  doneNav.textContent = done.length ? (doneIdx >= 0 ? (doneIdx + 1) + " / " + done.length + " done" : done.length + " done") : "0 done";
  btnPrev.disabled = done.length < 2;
  btnNext.disabled = done.length < 2;

  if (!run) {
    detailId.textContent = "select an ad";
    detailLine.textContent = "click a finished dot to inspect original vs reconstruct";
    setShot(shotOriginal, null, null, "—", origCache);
    setShot(shotPreview, null, null, "—", prevCache);
    return;
  }

  detailId.textContent = shortId(run.id);
  detailId.title = run.id;
  const stage = run.complete ? "done" : (run.active || run.status || "pending");
  detailLine.innerHTML =
    "<em>" + stage + "</em> · " +
    run.percent.toFixed(1) + "% · " +
    fmtElapsed(run.started_at ? (Date.now() / 1000 - run.started_at) : run.elapsed_s) +
    (run.status === "stalled" ? " · stalled" : "") +
    (run.failed ? " · failed" : "") +
    (run.status === "partial" ? " · partial" : "");

  const origFile = run.has_original ? "original.png" : null;
  const prevFile = run.has_preview ? "preview.png" : null;

  setShot(
    shotOriginal, run, origFile,
    run.status === "pending" ? "not started" : "no original",
    origCache
  );

  if (run.complete || prevFile) {
    setShot(
      shotPreview, run, prevFile,
      run.complete ? "no preview yet" : "reconstructing…",
      prevCache
    );
  } else if (run.status === "running" || run.status === "stalled") {
    setShot(shotPreview, null, null, "live · waiting on preview", prevCache);
  } else if (run.status === "partial") {
    setShot(shotPreview, run, prevFile, "stopped before preview", prevCache);
  } else {
    setShot(shotPreview, null, null, "—", prevCache);
  }
}

function renderLive() {
  const live = state && state.live;
  const bench = state && state.benchmark;
  if (!live) {
    liveAd.innerHTML = "<span>waiting for pipeline.log</span>";
    liveChip.textContent = "idle";
    liveChip.className = "chip";
    liveChip.title = "";
    liveNums.innerHTML = "<b>0.0%</b> · 00:00";
    pulseDot.className = "pulse-dot";
    ticker.textContent = "waiting for pipeline.log";
  } else {
    const doing = live.complete ? "done" : (live.active || "…");
    liveAd.innerHTML = shortId(live.image_id) + " <span>· " + doing + "</span>";
    liveAd.title = live.image_id;
    liveChip.textContent = doing;
    liveChip.className = "chip stage";
    pulseDot.className = "pulse-dot on";
    if (live.stalled) {
      liveChip.className = "chip stall";
      liveChip.textContent = "stalled";
      liveChip.title = "no new pipeline.log line for 90s on the current ad";
      pulseDot.className = "pulse-dot stall";
    } else {
      liveChip.title = "";
    }
    if (live.failed) { liveChip.className = "chip fail"; liveChip.textContent = "failed"; liveChip.title = ""; }
    const elapsed = live.started_at ? (Date.now() / 1000 - live.started_at) : live.elapsed_s;
    liveNums.innerHTML = "<b>" + live.percent.toFixed(1) + "%</b> · " + fmtElapsed(elapsed);
    const line = live.last_line || doing;
    if (ticker.dataset.line !== line) {
      ticker.dataset.line = line;
      ticker.classList.remove("flash");
      void ticker.offsetWidth;
      ticker.classList.add("flash");
      ticker.innerHTML = "<em>" + doing + "</em> · " + line;
    }
  }
  if (bench) {
    benchLabel.textContent = "benchmark · " + (bench.name || "runs");
    benchCount.textContent = bench.done_count + " / " + bench.total + " ads";
    benchPct.textContent = bench.percent.toFixed(1) + "%";
  }
}

function followLiveIfNeeded() {
  const live = state && state.live;
  if (!live) return;
  const gen = state.generation || 0;
  if (gen !== lastGeneration) {
    // New live image — unfollow pin so the grid tracks the batch.
    if (lastGeneration >= 0) pinned = false;
    lastGeneration = gen;
  }
  if (!pinned || !selectedId) {
    selectedId = live.image_id;
  }
}

function render(force) {
  if (!state) return;
  const rev = state.rev || 0;
  if (!force && rev === lastRev) {
    renderLive();
    renderDetail();
    return;
  }
  lastRev = rev;
  if (state.stages && state.stages.length) stages = state.stages;
  followLiveIfNeeded();
  renderLive();
  paintHeat();
  const focus = selectedId ? runById(selectedId) : null;
  stageLabel.textContent = focus ? ("stages · " + shortId(focus.id)) : "stages";
  if (focus) stageLabel.title = focus.id;  paintStages(focus);
  renderDetail();
}

function applyStatus(data) {
  if (!data) return;
  state = data;
  render(false);
}

async function pollOnce() {
  try {
    const res = await fetch("/status.json?_=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("bad status");
    applyStatus(await res.json());
  } catch (_) {}
}

function connectSSE() {
  let es;
  try {
    es = new EventSource("/events");
  } catch (_) {
    return false;
  }
  es.onmessage = (ev) => {
    try { applyStatus(JSON.parse(ev.data)); } catch (_) {}
  };
  return true;
}

const sseOk = connectSSE();
setInterval(pollOnce, sseOk ? 400 : 120);
setInterval(() => { if (state) { renderLive(); renderDetail(); } }, 100);
pollOnce();
</script>
</body>
</html>
