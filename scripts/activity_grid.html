<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>bench · ad-decompiler</title>
<style>
  :root {
    --bg: #0c0d0f;
    --ink: #c6ccd2;
    --dim: #82898f;
    --faint: #4a5057;
    --line: #1d2126;
    --cell: #1a1e23;
    --done: #59616b;
    --run: #e8edf2;
    --err: #e5534b;
    --stall: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 12px/1.5 ui-monospace, "Cascadia Mono", Consolas, monospace;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 14px 14px 28px; }
  .row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .dim { color: var(--dim); }
  .faint { color: var(--faint); }
  .err { color: var(--err); }
  .ellip { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  hr { border: 0; border-top: 1px solid var(--line); margin: 10px 0; }

  header .path { flex: 1; min-width: 120px; }
  #summary { margin-top: 2px; }

  /* matrix */
  #grid { margin-top: 4px; }
  .m {
    display: grid;
    grid-template-columns: minmax(70px, 120px) minmax(0, 1fr) 34px 44px 40px;
    gap: 0 10px;
    align-items: center;
    padding: 3px 4px;
    margin: 0 -4px;
    cursor: pointer;
    border-left: 2px solid transparent;
  }
  .m:hover { background: #121418; }
  .m.sel { background: #14171b; border-left-color: var(--faint); }
  .m.live { border-left-color: var(--run); }
  .m .id { font-size: 11px; }
  .m.st-pending .id { color: var(--faint); }
  .m.st-failed .id { color: var(--err); }
  .m.st-stalled .id { color: var(--stall); }
  .num { text-align: right; font-size: 11px; color: var(--dim); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .num.q { color: var(--faint); }
  .track { display: grid; grid-template-columns: repeat(18, 1fr); gap: 2px; min-width: 0; }
  .c { height: 9px; background: var(--cell); }
  .c.done { background: var(--done); }
  .c.active { background: var(--run); animation: pulse 1.4s ease-in-out infinite; }
  .c.stalled { background: var(--stall); }
  .c.failed { background: var(--err); }
  @keyframes pulse { 50% { opacity: 0.35; } }
  #empty { color: var(--faint); padding: 12px 0; }

  /* live + feed */
  #live { margin-top: 2px; }
  #liveLine { font-size: 11px; }
  #feed { margin-top: 6px; font-size: 11px; color: var(--faint); }
  #feed div { display: flex; gap: 8px; }
  #feed .t { flex: 0 0 auto; }
  #feed .k-error { color: var(--err); }
  #feed .last { color: var(--dim); }

  /* inspect */
  #inspect { margin-top: 4px; }
  .shots { display: flex; gap: 8px; margin-top: 6px; }
  .shot { flex: 1; min-width: 0; }
  .shot .box {
    aspect-ratio: 4 / 5;
    background: #101215;
    border: 1px solid var(--line);
    display: grid; place-items: center;
    color: var(--faint); font-size: 10px; text-align: center; padding: 6px;
    overflow: hidden;
  }
  .shot .box.has-img { cursor: zoom-in; padding: 0; }
  .shot .box img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .shot .lbl { font-size: 10px; color: var(--faint); margin-bottom: 3px; }
  .nav { margin-top: 6px; display: flex; gap: 6px; align-items: baseline; }
  .nav button {
    appearance: none; border: 1px solid var(--line); background: transparent;
    color: var(--dim); font: 11px ui-monospace, monospace;
    padding: 2px 8px; cursor: pointer;
  }
  .nav button:hover:not(:disabled) { color: var(--ink); border-color: var(--faint); }
  .nav button:disabled { opacity: 0.35; cursor: default; }
  .nav .n { margin-left: auto; color: var(--faint); font-size: 11px; }

  footer { margin-top: 12px; color: var(--faint); font-size: 10px; }

  /* lightbox */
  #lb {
    display: none; position: fixed; inset: 0; z-index: 10;
    background: rgba(8, 9, 11, 0.92);
    align-items: center; justify-content: center; padding: 20px; cursor: zoom-out;
  }
  #lb.open { display: flex; }
  #lb img { max-width: 96vw; max-height: 92vh; object-fit: contain; }

  @media (max-width: 560px) {
    .m { grid-template-columns: minmax(60px, 90px) minmax(0, 1fr) 40px; }
    .m .time, .m .q { display: none; }
    .shots { flex-direction: column; }
    .shot .box { aspect-ratio: auto; max-height: 46vh; min-height: 80px; }
    .shot .box img { height: auto; max-height: 46vh; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="row">
    <span class="path ellip dim" id="rootPath">—</span>
    <span id="phase" class="faint">waiting</span>
    <span id="conn" class="faint">connecting</span>
  </header>
  <div id="summary" class="dim">—</div>
  <hr />

  <div id="grid"></div>
  <div id="empty" hidden>no runs — watching for pipeline.log files</div>
  <hr />

  <div id="live">
    <div class="row">
      <span id="lvId">—</span>
      <span id="lvStage" class="dim">idle</span>
      <span id="lvMeta" class="faint"></span>
    </div>
    <div id="liveLine" class="faint ellip">—</div>
    <div id="feed"></div>
  </div>
  <hr />

  <div id="inspect">
    <div class="row">
      <span id="cmpId" class="dim">select a run</span>
      <span id="cmpSub" class="faint"></span>
    </div>
    <div class="shots">
      <div class="shot"><div class="lbl">original</div><div class="box" id="shotO">—</div></div>
      <div class="shot"><div class="lbl">rebuild</div><div class="box" id="shotP">—</div></div>
    </div>
    <div class="nav">
      <button id="btnPrev" disabled>‹</button>
      <button id="btnNext" disabled>›</button>
      <span class="n" id="doneNav"></span>
    </div>
  </div>

  <footer id="footUpdated">—</footer>
</div>

<div id="lb"><img id="lbImg" alt="" /></div>

<script>
"use strict";

const DEFAULT_STAGES = [
  "normalize","ocr","text","residual","qwen","sam","elements","peel",
  "merge","structure","reconstruct","layout","design","preview","figma",
  "export","diff","qa"
];

const $ = (id) => document.getElementById(id);
const els = {
  rootPath: $("rootPath"), phase: $("phase"), conn: $("conn"), summary: $("summary"),
  grid: $("grid"), empty: $("empty"),
  lvId: $("lvId"), lvStage: $("lvStage"), lvMeta: $("lvMeta"), liveLine: $("liveLine"),
  feed: $("feed"),
  cmpId: $("cmpId"), cmpSub: $("cmpSub"), shotO: $("shotO"), shotP: $("shotP"),
  btnPrev: $("btnPrev"), btnNext: $("btnNext"), doneNav: $("doneNav"),
  footUpdated: $("footUpdated"),
  lb: $("lb"), lbImg: $("lbImg"),
};

let stages = DEFAULT_STAGES.slice();
let state = null;
let selectedId = null;
let pinned = false;
let lastRev = -1;
let lastGeneration = -1;
let lastRecvAt = 0;
let sseMode = "connecting";
const rowSigs = new Map();

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function shortId(id) {
  if (!id) return "";
  const parts = String(id).split("_");
  if (parts.length >= 2 && /^\d+/.test(parts[0])) return parts.slice(0, 2).join("_");
  return id.length > 18 ? id.slice(0, 16) + "…" : id;
}
function fmtDur(s) {
  s = Math.max(0, Math.round(s || 0));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h) return h + ":" + String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}
function elapsedFor(run) {
  if (!run) return 0;
  const ticking = run.status === "running" || run.status === "stalled";
  if (ticking && run.started_at) return Math.max(0, Date.now() / 1000 - run.started_at);
  return Number(run.elapsed_s || 0);
}
function runsList() { return (state && state.benchmark && state.benchmark.runs) || []; }
function runById(id) { return runsList().find((r) => r.id === id) || null; }
function doneRuns() { return runsList().filter((r) => r.complete); }

function selectAd(id, fromUser) {
  if (!id) return;
  if (fromUser && selectedId === id && pinned) { pinned = false; }
  else { selectedId = id; if (fromUser) pinned = true; }
  render(true);
}
function stepDone(delta) {
  const done = doneRuns();
  if (!done.length) return;
  let idx = done.findIndex((r) => r.id === selectedId);
  if (idx < 0) idx = delta > 0 ? -1 : 0;
  idx = (idx + delta + done.length) % done.length;
  selectAd(done[idx].id, true);
}
els.btnPrev.addEventListener("click", () => stepDone(-1));
els.btnNext.addEventListener("click", () => stepDone(1));

function followLiveIfNeeded() {
  const live = state && state.live;
  if (!live || live.image_id === "runtime-smoke") return;
  const gen = state.generation || 0;
  if (gen !== lastGeneration) {
    if (lastGeneration >= 0) pinned = false;
    lastGeneration = gen;
  }
  if (!pinned || !selectedId) selectedId = live.image_id;
}

function renderHeader() {
  const bench = state && state.benchmark;
  els.rootPath.textContent = (bench && bench.root) || "—";
  els.rootPath.title = (bench && bench.root) || "";

  const phase = (state && state.phase) || "waiting";
  const runs = runsList();
  const anyActive = runs.some((r) => r.status === "running" || r.status === "stalled");
  const allDone = runs.length > 0 && runs.every((r) => r.complete);
  let label = "waiting";
  if (phase === "smoke") label = "smoke";
  else if (anyActive) label = "running";
  else if (allDone) label = "complete";
  else if (runs.length) label = "idle";
  els.phase.textContent = label;
}

function renderConn() {
  const age = lastRecvAt ? (Date.now() - lastRecvAt) / 1000 : Infinity;
  if (age > 15) { els.conn.textContent = "no data"; els.conn.className = "err"; }
  else if (sseMode === "live") { els.conn.textContent = "sse"; els.conn.className = "faint"; }
  else if (sseMode === "poll") { els.conn.textContent = "poll"; els.conn.className = "faint"; }
  else { els.conn.textContent = "connecting"; els.conn.className = "faint"; }
}

function renderSummary() {
  const runs = runsList();
  const done = doneRuns();
  const failed = runs.filter((r) => r.status === "failed");
  if (!runs.length) { els.summary.textContent = "—"; return; }

  const parts = [done.length + "/" + runs.length + " done"];
  if (failed.length) parts.push('<span class="err">' + failed.length + " failed</span>");

  const avg = done.length ? done.reduce((a, r) => a + (r.elapsed_s || 0), 0) / done.length : null;
  if (avg != null) parts.push("avg " + fmtDur(avg));

  const pendingCt = runs.filter((r) => r.status === "pending").length;
  const lv = state.live && state.live.image_id !== "runtime-smoke" ? runById(state.live.image_id) : null;
  const liveFrac = lv && !lv.complete && (lv.status === "running" || lv.status === "stalled")
    ? 1 - (lv.percent || 0) / 100 : 0;
  const remaining = pendingCt + liveFrac;
  if (avg != null && remaining > 0.01) parts.push("eta ~" + fmtDur(avg * remaining));

  const withQa = done.filter((r) => r.qa && typeof r.qa.ssim === "number");
  if (withQa.length) {
    const mSsim = withQa.reduce((a, r) => a + r.qa.ssim, 0) / withQa.length;
    const mRec = withQa.reduce((a, r) => a + (r.qa.text_recall || 0), 0) / withQa.length;
    parts.push("ssim " + mSsim.toFixed(3));
    parts.push("recall " + (mRec * 100).toFixed(0) + "%");
  }
  els.summary.innerHTML = parts.join('<span class="faint"> · </span>');
}

function cellState(run, name) {
  if (run.complete || (run.done || []).includes(name)) return "done";
  if (run.active === name) {
    if (run.failed) return "failed";
    if (run.stalled) return "stalled";
    return "active";
  }
  return "";
}

function buildGrid() {
  els.grid.innerHTML = "";
  rowSigs.clear();
  runsList().forEach((run) => {
    const row = document.createElement("div");
    row.className = "m";
    row.dataset.id = run.id;
    row.addEventListener("click", () => selectAd(run.id, true));
    els.grid.appendChild(row);
  });
}

function renderGrid() {
  const runs = runsList();
  els.empty.hidden = runs.length > 0;
  if (!runs.length) { els.grid.innerHTML = ""; rowSigs.clear(); return; }

  const liveId = state && state.live ? state.live.image_id : null;
  const rows = els.grid.querySelectorAll(".m");
  const idsMatch = rows.length === runs.length &&
    [...rows].every((el, i) => el.dataset.id === runs[i].id);
  if (!idsMatch) buildGrid();

  const rows2 = els.grid.querySelectorAll(".m");
  runs.forEach((run, i) => {
    const row = rows2[i];
    const isLive = run.id === liveId;
    const isSel = run.id === selectedId;
    const sig = [run.status, run.active, (run.done || []).length, run.complete,
      run.failed, run.stalled, Math.round(run.percent || 0),
      run.qa && run.qa.ssim, isSel, isLive].join("|");
    if (rowSigs.get(run.id) === sig) return;
    rowSigs.set(run.id, sig);

    row.className = "m st-" + run.status + (isLive ? " live" : "") + (isSel ? " sel" : "");
    const secs = run.stage_secs || {};
    const cells = stages.map((name) => {
      const st = cellState(run, name);
      let tip = name + " · " + (st || "pending");
      if (st === "done" && secs[name] != null) tip += " · " + secs[name] + "s";
      return '<div class="c ' + st + '" title="' + esc(tip) + '"></div>';
    }).join("");

    row.innerHTML =
      '<div class="id ellip" title="' + esc(run.id + " · " + run.status) + '">' + esc(shortId(run.id)) + "</div>" +
      '<div class="track">' + cells + "</div>" +
      '<div class="num">' + Number(run.percent || 0).toFixed(0) + "%</div>" +
      '<div class="num time" data-time-for="' + esc(run.id) + '">' + fmtDur(elapsedFor(run)) + "</div>" +
      '<div class="num q">' + (run.qa && typeof run.qa.ssim === "number" ? run.qa.ssim.toFixed(2) : "·") + "</div>";
  });
}

function renderLive() {
  const live = state && state.live;
  const phase = (state && state.phase) || "waiting";

  if (!live) {
    els.lvId.textContent = "—";
    els.lvStage.textContent = phase === "smoke" ? "smoke starting" : "idle";
    els.lvStage.className = "faint";
    els.lvMeta.textContent = "";
    els.liveLine.textContent = "—";
    renderFeed();
    return;
  }
  const isSmoke = live.image_id === "runtime-smoke";
  els.lvId.textContent = shortId(live.image_id);
  els.lvId.title = live.image_id;

  let stageText = live.active || "…", cls = "dim";
  if (live.failed && !live.complete) { stageText = "failed · " + (live.active || "?"); cls = "err"; }
  else if (live.stalled) { stageText = (live.active || "…") + " · stalled"; cls = "err"; }
  else if (live.complete) { stageText = "complete"; cls = "faint"; }
  els.lvStage.textContent = stageText;
  els.lvStage.className = cls;

  const idx = live.active ? stages.indexOf(live.active) + 1 : (live.complete ? stages.length : 0);
  els.lvMeta.textContent = fmtDur(elapsedFor(live)) + " · " +
    Number(live.percent || 0).toFixed(0) + "%" +
    (isSmoke ? "" : " · " + idx + "/" + stages.length);
  els.liveLine.textContent = live.last_line || "—";
  els.liveLine.title = live.last_line || "";
  renderFeed();
}

function renderFeed() {
  const items = ((state && state.feed) || []).slice(-6);
  const sig = items.map((e) => (e.t || "") + (e.text || "")).join("\n");
  if (els.feed.dataset.sig === sig) return;
  els.feed.dataset.sig = sig;
  els.feed.innerHTML = items.map((e, i) => {
    const cls = (e.kind === "error" ? "k-error" : "") + (i === items.length - 1 ? " last" : "");
    return '<div class="' + cls + '"><span class="t">' + esc(e.t || "··:··:··") + "</span>" +
      '<span class="ellip" title="' + esc(e.text || "") + '">' +
      (e.ad ? esc(shortId(e.ad)) + " " : "") + esc(e.text || "") + "</span></div>";
  }).join("");
}

const shotCache = { o: "", p: "" };
function setShot(el, run, file, emptyMsg, key) {
  if (!run || !file) {
    el.classList.remove("has-img");
    el.removeAttribute("data-full");
    if (shotCache[key] !== "e:" + emptyMsg) {
      el.textContent = emptyMsg;
      shotCache[key] = "e:" + emptyMsg;
    }
    return;
  }
  const sig = run.id + ":" + file + ":" + Math.floor(run.mtime || 0);
  if (sig === shotCache[key]) return;
  shotCache[key] = sig;
  el.innerHTML = "";
  const src = "/asset/" + encodeURIComponent(run.id) + "/" + file + "?t=" + Math.floor(run.mtime || Date.now());
  const img = document.createElement("img");
  img.alt = file;
  img.src = src;
  img.onerror = () => {
    el.classList.remove("has-img");
    el.textContent = "missing";
    shotCache[key] = "m:" + sig;
  };
  el.classList.add("has-img");
  el.dataset.full = src;
  el.appendChild(img);
}

function renderInspect() {
  const id = selectedId || (state && state.live && state.live.image_id);
  const run = id && id !== "runtime-smoke" ? runById(id) : null;
  const done = doneRuns();
  const doneIdx = run ? done.findIndex((r) => r.id === run.id) : -1;

  els.doneNav.textContent = done.length
    ? (doneIdx >= 0 ? (doneIdx + 1) + "/" + done.length : String(done.length)) + " done"
    : "";
  els.btnPrev.disabled = done.length < 2;
  els.btnNext.disabled = done.length < 2;

  if (!run) {
    els.cmpId.textContent = "select a run";
    els.cmpSub.textContent = "";
    setShot(els.shotO, null, null, "—", "o");
    setShot(els.shotP, null, null, "—", "p");
    return;
  }

  els.cmpId.textContent = shortId(run.id);
  els.cmpId.title = run.id;
  const qa = run.qa && typeof run.qa.ssim === "number"
    ? " · ssim " + run.qa.ssim.toFixed(3) +
      " · recall " + ((run.qa.text_recall || 0) * 100).toFixed(0) + "%" +
      (run.qa.repairs != null ? " · repairs " + run.qa.repairs : "")
    : "";
  els.cmpSub.textContent = run.status + " · " + Number(run.percent || 0).toFixed(0) + "% · " +
    fmtDur(elapsedFor(run)) + qa;

  setShot(els.shotO, run, run.has_original ? "original.png" : null,
    run.status === "pending" ? "queued" : "waiting on normalize", "o");
  if (run.complete || run.has_preview) {
    setShot(els.shotP, run, run.has_preview ? "preview.png" : null, "no preview", "p");
  } else if (run.status === "running" || run.status === "stalled") {
    setShot(els.shotP, null, null, "after reconstruct", "p");
  } else {
    setShot(els.shotP, null, null, run.status === "partial" ? "stopped early" : "queued", "p");
  }
}

function openLightbox(src) {
  if (!src) return;
  els.lbImg.src = src;
  els.lb.classList.add("open");
}
function closeLightbox() {
  els.lb.classList.remove("open");
  els.lbImg.removeAttribute("src");
}
els.shotO.addEventListener("click", () => { if (els.shotO.dataset.full) openLightbox(els.shotO.dataset.full); });
els.shotP.addEventListener("click", () => { if (els.shotP.dataset.full) openLightbox(els.shotP.dataset.full); });
els.lb.addEventListener("click", closeLightbox);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeLightbox(); });

function render(force) {
  if (!state) return;
  const rev = state.rev || 0;
  if (!force && rev === lastRev) return;
  lastRev = rev;
  if (state.stages && state.stages.length) stages = state.stages;
  followLiveIfNeeded();
  renderHeader();
  renderSummary();
  renderGrid();
  renderLive();
  renderInspect();
  const d = new Date((state.updated_at || Date.now() / 1000) * 1000);
  els.footUpdated.textContent = "updated " + d.toLocaleTimeString();
}

function applyStatus(data) {
  if (!data) return;
  state = data;
  lastRecvAt = Date.now();
  render(false);
}

setInterval(() => {
  if (!state) { renderConn(); return; }
  const live = state.live;
  if (live && (live.status === "running" || live.status === "stalled")) {
    const idx = live.active ? stages.indexOf(live.active) + 1 : 0;
    els.lvMeta.textContent = fmtDur(elapsedFor(live)) + " · " +
      Number(live.percent || 0).toFixed(0) + "%" +
      (live.image_id === "runtime-smoke" ? "" : " · " + idx + "/" + stages.length);
  }
  document.querySelectorAll("[data-time-for]").forEach((el) => {
    const run = runById(el.getAttribute("data-time-for"));
    if (run && (run.status === "running" || run.status === "stalled")) {
      el.textContent = fmtDur(elapsedFor(run));
    }
  });
  renderConn();
}, 500);

async function pollOnce() {
  try {
    const res = await fetch("/status.json?_=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("bad status");
    if (sseMode !== "live") sseMode = "poll";
    applyStatus(await res.json());
  } catch (_) { /* keep last state */ }
}
function connectSSE() {
  let es;
  try { es = new EventSource("/events"); } catch (_) { sseMode = "poll"; return; }
  es.onopen = () => { sseMode = "live"; renderConn(); };
  es.onerror = () => { sseMode = "poll"; renderConn(); };
  es.onmessage = (ev) => {
    sseMode = "live";
    try { applyStatus(JSON.parse(ev.data)); } catch (_) {}
  };
}
connectSSE();
setInterval(pollOnce, 2000);
pollOnce();
document.addEventListener("visibilitychange", () => { if (!document.hidden) pollOnce(); });
</script>
</body>
</html>
